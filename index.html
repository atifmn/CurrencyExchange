<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web GUI App</title>
    <!-- Connect the CSS file -->
    <link rel="stylesheet" href="styling.css">
</head>
<body>
    <div id="gui-container">
        <h1>Currency Exchange</h1>

        <h3>Convert from:</h3>
        <select> 
            <option value="USD"> USD </option>
            <option value="EUR"> EUR </option>
        </select>

        <h3>Convert to:</h3>
        <select> 
            <option value="USD"> USD </option>
            <option value="EUR"> EUR </option>
        </select>

        <p></p>

        <label for="amount">Currency Amount:</label>
        <input type="number" id="currency" name="currency" min="0.00" placeholder="0.00" step="0.01"><br><br>

        <button id="action-btn">Trigger Action</button>
    </div>

    <!-- Connect the JavaScript file -->
    <script src="app.js"></script>
</body>
</html>
